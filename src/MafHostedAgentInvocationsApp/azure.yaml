# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: ai-foundry-starter-basic
services:
    maf-hosted-agent-invocations-app:
        project: .
        host: azure.ai.agent
        language: csharp
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
infra:
    provider: bicep
    path: ./infra
