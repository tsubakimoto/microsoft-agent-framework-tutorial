# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: maf-hosted-agent-app
description: |
    A simple general-purpose AI assistant hosted as a Foundry Hosted Agent using the Agent Framework.
metadata:
    tags:
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - Agent Framework
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5-mini
code_configuration:
    runtime: dotnet_10
    entry_point: MafHostedAgentApp.dll
    dependency_resolution: bundled
